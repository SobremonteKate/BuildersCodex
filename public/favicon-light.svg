<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#f4f6fa"/>
  <rect x="2" y="2" width="28" height="28" rx="4" fill="none" stroke="#d1d5db" stroke-width="1"/>
  <text x="7" y="22" font-family="monospace" font-size="18" font-weight="700" fill="#d97706" filter="url(#glow)">C</text>
  <text x="17" y="19" font-family="monospace" font-size="6" fill="#3a9bc0" opacity="0.7">✦</text>
  <defs>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
